<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hesabım | Klima Kombi Merkezi</title>
<link rel="stylesheet" href="/css/style.css?v=3">
<style>
.account-layout { display: grid; grid-template-columns: 240px 1fr; gap: var(--space-8); align-items: start; padding: var(--space-8) 0; }
.account-menu { background: var(--c-surface); border-radius: var(--r-lg); border: 1px solid var(--c-border); overflow: hidden; position: sticky; top: 80px; }
.account-menu a { display: flex; align-items: center; gap: 12px; padding: 16px; color: var(--c-text); text-decoration: none; border-bottom: 1px solid var(--c-border); transition: all 0.2s; font-weight: 500; }
.account-menu a:last-child { border-bottom: none; }
.account-menu a:hover { background: var(--c-bg); color: var(--c-primary); }
.account-menu a.active { background: var(--c-primary-light); color: var(--c-primary); border-left: 4px solid var(--c-primary); }
.account-menu-icon { font-size: 20px; }
.account-section { display: none; background: var(--c-surface); border-radius: var(--r-xl); border: 1px solid var(--c-border); padding: var(--space-6); min-height: 400px; }
.account-section.active { display: block; }
.order-card { border: 1px solid var(--c-border); border-radius: var(--r-lg); padding: var(--space-5); margin-bottom: var(--space-4); background: var(--c-bg); }
.order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px dotted var(--c-border); }
@media (max-width: 768px) {
  .account-layout { grid-template-columns: 1fr; }
  .account-menu { position: static; display: grid; grid-template-columns: 1fr 1fr; border-bottom: none; }
  .account-menu a { border: 1px solid var(--c-border); border-radius: var(--r-md); margin-bottom: 8px; justify-content: center; }
  .account-menu a.active { border-left: 1px solid var(--c-border); background: var(--c-primary); color: #fff; }
}
</style>
</head>
<body class="bg-gray">

<!-- NAVBAR (Injected by JS) -->
<nav class="navbar"><div class="container"><div class="navbar-inner">
  <a href="/" class="nav-logo">
    <div style="width:38px;height:38px;background:linear-gradient(135deg,#1d4ed8,#1e3a8a);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:0 4px 14px rgba(29,78,216,0.35)">🔥</div>
    <div><div class="nav-logo-text">Klima Kombi Merkezi</div><div class="nav-logo-sub">Isıtma &amp; Soğutma Sistemleri</div></div>
  </a>
  <div class="nav-actions">
    <a href="/araclar.html" class="nav-btn desktop-only">🔧 Sihirbazlar</a>
    <a href="/sepet.html" class="nav-btn">🛒 <span class="cart-count cart-badge" style="display:none">0</span></a>
    <div id="nav-auth-area"></div>
  </div>
</div></div></nav>

<div class="container">
  <div class="account-layout">
    <!-- SIDEBAR -->
    <div class="account-menu">
      <a href="#profil" class="active" onclick="showSection('profil', this)"><span class="account-menu-icon">👤</span> Profil Bilgileri</a>
      <a href="#siparisler" onclick="showSection('siparisler', this)"><span class="account-menu-icon">📦</span> Siparişlerim</a>
      <a href="#teklifler" onclick="showSection('teklifler', this)"><span class="account-menu-icon">📩</span> Teklif Taleplerim</a>
      <a href="#" onclick="Auth.logout()"><span class="account-menu-icon">🚪</span> Çıkış Yap</a>
    </div>

    <!-- CONTENT -->
    <div>
      <!-- PROFIL -->
      <div id="sec-profil" class="account-section active">
        <h2 style="font-size:24px;font-weight:800;margin-bottom:24px;color:var(--c-text)">Profil Bilgileri</h2>
        <div id="profile-content" style="max-width:500px"></div>
      </div>

      <!-- SIPARISLER -->
      <div id="sec-siparisler" class="account-section">
        <h2 style="font-size:24px;font-weight:800;margin-bottom:24px;color:var(--c-text)">Siparişlerim</h2>
        <div id="orders-content">Yükleniyor...</div>
      </div>

      <!-- TEKLIFLER -->
      <div id="sec-teklifler" class="account-section">
        <h2 style="font-size:24px;font-weight:800;margin-bottom:24px;color:var(--c-text)">Teklif Taleplerim</h2>
        <div id="quotes-content" style="color:var(--c-text-muted)">Henüz bir teklif talebiniz bulunmuyor.</div>
      </div>
    </div>
  </div>
</div>

<script src="/js/app.js?v=3"></script>
<script>
if (!Auth.isLoggedIn()) {
  window.location.href = '/giris.html';
}

const user = Auth.getUser();

function showSection(id, el) {
  document.querySelectorAll('.account-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.account-menu a').forEach(a => a.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  if (el) el.classList.add('active');
}

// Check URL hash for direct unlinking (e.g. /hesabim.html#siparisler)
if (window.location.hash) {
  const hash = window.location.hash.replace('#', '');
  const link = document.querySelector(`.account-menu a[href="#${hash}"]`);
  if (link) showSection(hash, link);
}

// Render Profile
document.getElementById('profile-content').innerHTML = `
  <div style="background:var(--c-bg);border:1px solid var(--c-border);padding:20px;border-radius:var(--r-lg);">
    <div style="margin-bottom:16px"><strong style="display:block;color:var(--c-text-muted);font-size:13px">Ad Soyad</strong><div style="font-size:16px">${user.name}</div></div>
    <div style="margin-bottom:16px"><strong style="display:block;color:var(--c-text-muted);font-size:13px">E-posta</strong><div style="font-size:16px">${user.email}</div></div>
    <div><strong style="display:block;color:var(--c-text-muted);font-size:13px">Hesap Türü</strong><div style="font-size:16px;text-transform:uppercase">${user.role === 'dealer' ? '🏢 Bayi' : user.role === 'customer' ? 'Müşteri' : user.role}</div></div>
  </div>
  ${user.role === 'dealer' ? `<div style="margin-top:24px"><a href="/bayi.html" class="btn btn-primary">🏢 Bayi Paneline Git →</a></div>` : ''}
`;

// Load Orders
async function loadOrders() {
  try {
    const orders = await API.get('/orders/my-orders');
    const c = document.getElementById('orders-content');
    if (!orders || orders.length === 0) {
      c.innerHTML = '<p style="color:var(--c-text-muted);padding:40px;text-align:center;background:var(--c-bg);border-radius:var(--r-lg)">Henüz bir siparişiniz bulunmuyor.</p>';
      return;
    }
    c.innerHTML = orders.map(o => `
      <div class="order-card">
        <div class="order-header">
          <div>
            <div style="font-weight:700;font-size:16px;margin-bottom:4px">Sipariş #${o.id}</div>
            <div style="font-size:13px;color:var(--c-text-muted)">${new Date(o.created_at).toLocaleDateString('tr-TR', {day:'numeric',month:'long',year:'numeric'})}</div>
          </div>
          <div style="text-align:right">
            <span class="badge ${o.status==='completed'?'badge-green':o.status==='cancelled'?'badge-red':'badge-blue'}">${Format.orderStatus(o.status)}</span>
            <div style="font-weight:800;font-size:18px;margin-top:8px">${Format.price(o.total_amount)}</div>
          </div>
        </div>
        <div style="display:flex;gap:12px;overflow-x:auto;padding-bottom:8px">
          ${(o.items||[]).map(i => `
            <div style="border:1px solid var(--c-border);border-radius:var(--r-md);padding:8px;display:flex;align-items:center;gap:12px;min-width:260px">
              <img src="${(i.images?JSON.parse(i.images):[])[0]||'/images/no-image.png'}" style="width:40px;height:40px;object-fit:cover;border-radius:4px" onerror="this.onerror=null;this.src='/images/no-image.png'">
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${i.product_name}</div>
                <div style="font-size:12px;color:var(--c-text-muted)">${i.quantity} adet x ${Format.price(i.unit_price)}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('orders-content').innerHTML = `<p style="color:var(--c-error)">Siparişler yüklenemedi: ${e.message}</p>`;
  }
}

loadOrders();
</script>
</body>
</html>
